<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Generator</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 95%;
        }
        h1 { margin: 0 0 10px 0; color: #333; font-size: 24px; }
        p.desc { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        #resultArea {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            min-height: 200px;
            justify-content: center;
        }

        .game-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .row-label {
            font-weight: bold;
            color: #333;
            margin-right: 10px;
            font-size: 18px;
            width: 30px;
        }

        .ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
        }
        
        .c1 { background-color: #fbc400; text-shadow: none; color: #333; } 
        .c2 { background-color: #69c8f2; } 
        .c3 { background-color: #ff7272; } 
        .c4 { background-color: #aaaaaa; } 
        .c5 { background-color: #b0d840; } 

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            color: white;
        }
        button:active { transform: scale(0.95); }
        
        .btn-gen {
            background: linear-gradient(45deg, #673ab7, #512da8); 
            width: 100%; 
        }
        .btn-gen:hover { box-shadow: 0 5px 15px rgba(103, 58, 183, 0.4); }

        .btn-copy {
            background: #009688; 
            display: none; 
            flex: 1;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        .btn-copy:hover { box-shadow: 0 5px 15px rgba(0, 150, 136, 0.4); }

        /* 경고 박스 스타일 (빨간색) */
        .log-area {
            font-size: 13px;
            color: #721c24; /* 진한 빨강 글씨 */
            background: #f8d7da; /* 연한 빨강 배경 */
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
            border: 1px solid #f5c6cb; /* 테두리 */
            word-break: keep-all; /* 단어 단위 줄바꿈 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚖️ AI 로또번호 </h1>
        <p class="desc">3년 통계 반영 + 자연스러운 섞임</p>
        
        <div id="resultArea">
            <div style="color:#bbb; padding:50px;">
                버튼을 누르면<br>균형 잡힌 번호가 나옵니다.
            </div>
        </div>

        <div class="btn-group">
            <button onclick="drawFiveGames()" class="btn-gen" id="btnGen">🎲 5게임 생성하기</button>
            <button onclick="copyNumbers()" class="btn-copy" id="btnCopy">📋 전체 복사</button>
        </div>

        <div class="log-area">
            ⚠️ <b>경고:</b> 이 프로그램은 과거 통계에 단순 가중치를 부여한 시뮬레이션입니다.<br>
            <b>과학적 당첨 확률을 절대 보장하지 않으며,</b> 실제 로또 당첨 확률과는 무관할 수 있습니다.<br>
            재미로만 즐겨주세요. 과도한 몰입은 금물입니다!
        </div>
    </div>

    <script>
        let clipboardText = "";

        function drawFiveGames() {
            const container = document.getElementById('resultArea');
            container.innerHTML = ''; 
            clipboardText = "[AI 로또 (밸런스형)]\n"; 
            
            const labels = ['A', 'B', 'C', 'D', 'E']; 

            for (let i = 0; i < 5; i++) {
                const numbers = getWeightedNumbers();
                createGameRow(container, labels[i], numbers);
                clipboardText += `${labels[i]}: ${numbers.join(', ')}\n`;
            }

            showCopyButton();
        }

        function showCopyButton() {
            const btnGen = document.getElementById('btnGen');
            const btnCopy = document.getElementById('btnCopy');
            btnGen.style.width = 'auto';
            btnGen.style.flex = '2';
            btnCopy.style.display = 'block';
        }

        function getWeightedNumbers() {
            const pool = [];
            // 1. 기본 번호
            for (let i = 1; i <= 45; i++) pool.push(i);

            // 2. 가중치 설정 (밸런스형)
            // 상위권 번호 가중치 (3개 추가)
            const steadyHot = [12, 13, 33, 34, 45]; 
            steadyHot.forEach(num => { for(let k=0; k<3; k++) pool.push(num); });

            // 차순위 번호 가중치 (1개 추가)
            const potentialHot = [3, 6, 7, 18, 19, 27, 30, 43]; 
            potentialHot.forEach(num => { for(let k=0; k<1; k++) pool.push(num); });

            const result = new Set();
            while(result.size < 6) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                result.add(pool[randomIndex]);
            }
            return Array.from(result).sort((a, b) => a - b);
        }

        function createGameRow(container, labelText, numbers) {
            const row = document.createElement('div');
            row.className = 'game-row';

            const label = document.createElement('span');
            label.className = 'row-label';
            label.innerText = labelText;
            row.appendChild(label);

            numbers.forEach(num => {
                const ball = document.createElement('div');
                ball.className = `ball ${getColorClass(num)}`;
                ball.innerText = num;
                row.appendChild(ball);
            });
            container.appendChild(row);
        }

        function getColorClass(num) {
            if (num <= 10) return 'c1'; 
            if (num <= 20) return 'c2'; 
            if (num <= 30) return 'c3'; 
            if (num <= 40) return 'c4'; 
            return 'c5'; 
        }

        function copyNumbers() {
            navigator.clipboard.writeText(clipboardText).then(() => {
                alert("복사되었습니다!");
            }).catch(err => {
                alert("복사 실패");
            });
        }
    </script>
</body>
</html>
